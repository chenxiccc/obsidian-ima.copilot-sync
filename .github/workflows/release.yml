# 仅 manifest.json 变更（版本号变更）时自动构建并发布到 GitHub Releases
# Only build and publish when manifest.json changes (i.e., version bump)

name: Release Obsidian Plugin

on:
  push:
    branches:
      - main
    paths:
      - 'manifest.json'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 从 manifest.json 读取版本号 / Read version from manifest.json
      - name: Get version
        id: version
        run: echo "version=$(jq -r '.version' manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 生产构建（含 tsc 类型检查）/ Production build (includes tsc type check)
      - name: Build plugin
        run: npm run build

      # 生成构建来源证明 / Generate build provenance attestation
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      # 删除已存在的 Release 和 Tag，确保用最新构建产物重新发布
      # Delete existing release and tag to re-publish with latest build artifacts
      - name: Delete existing release
        continue-on-error: true
        run: |
          gh release delete "${{ steps.version.outputs.version }}" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 创建 Release 并上传 main.js、manifest.json 和 styles.css
      # Create Release and upload main.js, manifest.json, and styles.css
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
